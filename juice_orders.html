<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Order fresh, cold-pressed juice from Fresh Squeeze. Choose your flavour and quantity — made the moment you order.">
  <title>Place Order — Fresh Squeeze</title>
  <link rel="stylesheet" href="stylesheet.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>

  <div class="order-page" role="main">

    <!-- ── Left decorative panel (desktop) ───────────────── -->
    <div class="order-page__panel-left" aria-hidden="true">
      <img src="images/fruit-frame-wooden-background.jpg" alt="">
      <div class="order-page__panel-overlay"></div>
      <div class="order-page__panel-text">
        <div class="order-page__panel-brand">Fresh Squeeze</div>
        <p class="order-page__panel-tag">Cold-pressed. No preservatives.<br>Made the moment you order.</p>
      </div>
    </div>

    <!-- ── Right form panel ──────────────────────────────── -->
    <div class="order-page__right">
      <div class="order-card">

        <!-- Back link -->
        <a href="index.html" class="order-card__back" id="back-to-home">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
          Back to menu
        </a>

        <!-- Identity -->
        <div class="order-card__logo" aria-hidden="true">Fresh Squeeze</div>

        <!-- Heading -->
        <h1 class="order-card__title">Place Your<br>Order</h1>
        <p class="order-card__sub">Freshly squeezed the moment you press order.</p>

        <!-- Visual separator — same terracotta language as kickers -->
        <div class="order-card__divider" aria-hidden="true"></div>

        <!-- Hidden checkbox — powers the CSS popup -->
        <input type="checkbox" id="popup-toggle" aria-hidden="true">

        <!-- Juice selector -->
        <div class="form-group">
          <label class="form-label" for="juice">Choose your juice</label>
          <select class="form-control form-control--select" id="juice" name="juice" aria-required="true">
            <option value="orange">🍊 Fresh Orange — ₹50</option>
            <option value="strawberry">🍓 Strawberry Bliss — ₹70</option>
            <option value="apple">🍏 Crisp Apple — ₹60</option>
            <option value="mango">🥭 Tropical Mango — ₹60</option>
            <option value="pineapple">🍍 Golden Pineapple — ₹60</option>
          </select>
        </div>

        <!-- Quantity -->
        <div class="form-group">
          <label class="form-label" for="quantity">Number of glasses</label>
          <input
            class="form-control"
            type="number"
            id="quantity"
            name="quantity"
            min="1"
            max="100"
            value="1"
            aria-label="Number of glasses"
          >
        </div>

        <!-- Submit — label triggers the hidden checkbox -->
        <label
          for="popup-toggle"
          class="btn-submit"
          id="submit-order-btn"
          role="button"
          tabindex="0"
          onkeydown="if(event.key==='Enter'||event.key===' ')this.click()"
          aria-label="Place your juice order"
        >
          Place Order →
        </label>

        <!-- Success toast (CSS-only, driven by :checked) -->
        <div class="order-toast" role="status" aria-live="polite" aria-label="Order confirmation">
          <span class="order-toast__icon" aria-hidden="true">✅</span>
          <div>
            <div class="order-toast__title">Order Placed!</div>
            <p class="order-toast__msg">Your juice is being pressed right now — it'll be ready in minutes.</p>
            <a href="index.html" class="order-toast__link" id="toast-home-link">Explore more flavours →</a>
          </div>
        </div>

      </div>
    </div>

  </div>

</body>
</html>
